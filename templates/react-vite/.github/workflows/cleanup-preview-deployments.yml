name: Cleanup Preview Deployments

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete preview deployments
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRepo = pr.head.repo.full_name;
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;

            if (headRepo !== baseRepo) {
              console.log(`Skipping cleanup for fork PR from ${headRepo}`);
              return;
            }

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.ref,
                environment: 'Preview',
              }
            );

            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
              await github.rest.repos.deleteDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
              });
            }

            if (deployments.length > 0) {
              console.log(`Cleaned up ${deployments.length} preview deployment(s)`);
            }
